name: Scrape ingatlan.com

on:
  schedule:
    # Naponta 03:15 UTC (~05:15 CEST). GitHub cron lehet kicsit késik.
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Listapages per type"
        required: false
        default: "10"
      max_details:
        description: "Max detail pages to scrape"
        required: false
        default: "200"

concurrency:
  group: scrape-ingatlan
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright + Patchright Chromium
        run: |
          npx playwright install --with-deps chromium
          npx patchright install chromium

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NETLIFY_DATABASE_URL: ${{ secrets.NETLIFY_DATABASE_URL }}
          SCRAPE_MAX_PAGES_PER_TYPE: ${{ github.event.inputs.max_pages || '10' }}
          SCRAPE_MAX_DETAILS: ${{ github.event.inputs.max_details || '200' }}
          SCRAPE_MIN_DELAY_MS: "1500"
          SCRAPE_MAX_DELAY_MS: "4500"
          SCRAPE_HEADLESS: "true"
        run: node scripts/scrape-playwright.mjs

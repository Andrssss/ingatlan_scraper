name: Scrape ingatlan.com

on:
  # Cron disabled until SCRAPINGBEE_API_KEY secret is set in repo settings.
  # schedule:
  #   - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      max_new:
        description: "Max new listings to detail-fetch"
        required: false
        default: "30"
      max_list_pages:
        description: "Max list pages per source"
        required: false
        default: "3"
      stealth:
        description: "Use stealth proxy (75 cr/req). false = premium (10 cr/req)"
        required: false
        default: "true"

concurrency:
  group: scrape-ingatlan
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run incremental scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NETLIFY_DATABASE_URL: ${{ secrets.NETLIFY_DATABASE_URL }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          SCRAPINGBEE_STEALTH: ${{ github.event.inputs.stealth || 'true' }}
          SCRAPE_MAX_NEW: ${{ github.event.inputs.max_new || '30' }}
          SCRAPE_MAX_LIST_PAGES: ${{ github.event.inputs.max_list_pages || '3' }}
        run: node scripts/scrape-incremental.mjs
